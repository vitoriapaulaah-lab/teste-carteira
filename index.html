<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda Tática Corporativa</title>
  
  <!-- Carrega o React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <!-- Carrega o Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- Carrega o Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- --- CONFIGURAÇÃO DAS CORES DA SUA LOGO --- -->
  <!-- Altere os códigos hexadecimais abaixo para as cores exatas da sua logo -->
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0f4f8',
              100: '#d9e2ec',
              200: '#bcccdc',
              300: '#9fb3c8',
              400: '#829ab1',
              500: '#627d98',
              600: '#1E3A8A', /* COR PRIMÁRIA: Azul escuro (usada em botões e fundos fortes) */
              700: '#172A66', /* Variação mais escura para hover nos botões */
              800: '#0F1A42', 
              900: '#0A122E', /* COR DE TEXTOS: Azul super escuro para os títulos principais */
              accent: '#00D4FF', /* COR DE DESTAQUE: (Ex: Ciano/Laranja) usada em ícones e detalhes */
            }
          }
        }
      }
    }
  </script>

  <!-- Carrega o Supabase (Biblioteca de Base de Dados) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <link rel="stylesheet" href="./style.css">
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="./app.jsx"></script>
</body>
</html>
